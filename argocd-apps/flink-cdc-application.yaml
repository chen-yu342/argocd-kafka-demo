apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-cdc-job
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chen-yu342/flink-cdc-helm-chart.git
    targetRevision: master
    path: .
    helm:
      valueFiles:
        - values.yaml
      releaseName: flink-cdc-app
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
